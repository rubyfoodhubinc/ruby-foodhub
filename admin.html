<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ruby FoodHub — Orders</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
  body { margin: 0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: oklch(97% 0.015 60); color: oklch(22% 0.02 40); }
  * { box-sizing: border-box; }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 40px 24px; }
  .login-card { max-width: 360px; margin: 120px auto; background: #fff; border-radius: 16px; box-shadow: 0 6px 18px rgba(34,30,26,.08); padding: 36px; text-align: center; }
  .login-card h1 { font-size: 20px; margin: 0 0 20px; }
  .login-card input, .team-card input, .team-card select { width: 100%; padding: 11px 14px; border: 1.5px solid rgba(34,30,26,.18); border-radius: 10px; font-size: 14.5px; margin-bottom: 14px; font-family: inherit; background: #fff; }
  .team-card { background: #fff; border-radius: 12px; box-shadow: 0 2px 10px rgba(34,30,26,.06); padding: 24px; margin-top: 28px; max-width: 420px; }
  .team-card h2 { font-size: 16px; margin: 0 0 14px; }
  .team-note { font-size: 12.5px; color: rgba(34,30,26,.55); margin: 10px 0 0; min-height: 16px; }
  button { background: oklch(45% 0.17 20); color: #fff; border: none; border-radius: 100px; padding: 12px 0; width: 100%; font-size: 14.5px; font-weight: 700; cursor: pointer; }
  button:hover { background: oklch(52% 0.19 20); }
  button:disabled { background: #ccc; cursor: not-allowed; }
  .error { color: oklch(45% 0.17 20); font-size: 13px; margin: 12px 0 0; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 12px; }
  .top-bar h1 { font-size: 22px; margin: 0; }
  .top-actions { display: flex; gap: 10px; }
  .small-btn { width: auto; padding: 9px 18px; font-size: 13px; }
  .sync-note { font-size: 13px; color: rgba(34,30,26,.6); margin: 0 0 14px; min-height: 18px; }
  .filter-bar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
  .filter-bar input[type="search"] { flex: 1; min-width: 220px; padding: 10px 14px; border: 1.5px solid rgba(34,30,26,.18); border-radius: 10px; font-size: 14px; font-family: inherit; }
  .filter-bar input[type="date"] { padding: 9px 12px; border: 1.5px solid rgba(34,30,26,.18); border-radius: 10px; font-size: 13.5px; font-family: inherit; color: oklch(22% 0.02 40); }
  .filter-bar .date-label { font-size: 12.5px; color: rgba(34,30,26,.55); }
  .clear-btn { width: auto; padding: 9px 16px; font-size: 13px; background: transparent; color: oklch(45% 0.17 20); border: 1.5px solid oklch(45% 0.17 20); }
  .clear-btn:hover { background: oklch(45% 0.17 20); color: #fff; }
  .result-count { font-size: 12.5px; color: rgba(34,30,26,.55); margin: 0 0 10px; }
  .table-scroll { overflow-x: auto; background: #fff; border-radius: 12px; box-shadow: 0 2px 10px rgba(34,30,26,.06); }
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 12px 16px; font-size: 14px; border-bottom: 1px solid rgba(34,30,26,.08); white-space: nowrap; }
  td.truncate { max-width: 220px; overflow: hidden; text-overflow: ellipsis; }
  th { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: rgba(34,30,26,.55); cursor: pointer; user-select: none; }
  th:hover { color: oklch(45% 0.17 20); }
  tr.summary-row { cursor: pointer; }
  tr.summary-row:hover td { background: oklch(98% 0.01 60); }
  tr:last-child td { border-bottom: none; }
  .status-pill { display: inline-block; background: oklch(90% 0.08 150); color: oklch(35% 0.1 150); font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 100px; }
  .status-select { font-size: 12px; font-weight: 700; padding: 4px 8px; border-radius: 100px; border: 1.5px solid transparent; cursor: pointer; font-family: inherit; }
  .status-select.is-pending { background: oklch(93% 0.06 75); color: oklch(40% 0.1 75); }
  .status-select.is-delivered { background: oklch(90% 0.08 150); color: oklch(35% 0.1 150); }
  .status-select:disabled { opacity: 0.5; cursor: wait; }
  .empty, .loading { text-align: center; padding: 60px 0; color: rgba(34,30,26,.5); }
  .sort-arrow { font-size: 10px; margin-left: 4px; opacity: 0.6; }
  .expand-caret { display: inline-block; width: 16px; color: rgba(34,30,26,.45); font-size: 11px; }
  .detail-cell { background: oklch(98.5% 0.008 60); padding: 18px 24px 22px; white-space: normal; }
  .detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px 28px; margin-bottom: 14px; }
  .detail-field .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: rgba(34,30,26,.5); margin-bottom: 3px; }
  .detail-field .value { font-size: 14px; white-space: pre-line; }
  .items-block { border-top: 1px solid rgba(34,30,26,.08); padding-top: 12px; }
  .items-block .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: rgba(34,30,26,.5); margin-bottom: 6px; }
  .items-table { width: auto; min-width: 320px; }
  .items-table td, .items-table th { padding: 5px 14px 5px 0; font-size: 13.5px; border: none; }
  .money-summary { margin-top: 12px; font-size: 13.5px; color: rgba(34,30,26,.75); }
  .money-summary strong { color: oklch(22% 0.02 40); }
</style>
</head>
<body>

<div id="login-view" class="login-card">
  <h1>Ruby FoodHub — Orders</h1>
  <input type="email" id="email-input" placeholder="Email" autocomplete="username" />
  <input type="password" id="password-input" placeholder="Password" autocomplete="current-password" />
  <button type="button" id="login-btn">Log In</button>
  <p class="error" id="login-error" hidden></p>
</div>

<div id="setup-view" class="login-card" hidden>
  <h1>First-Time Setup</h1>
  <p style="font-size:13px;color:rgba(34,30,26,.6);margin:0 0 16px;line-height:1.5">No admin accounts exist yet. Enter the shared admin password one last time to create the first owner account.</p>
  <input type="password" id="setup-bootstrap" placeholder="Current shared admin password" />
  <input type="text" id="setup-name" placeholder="Your full name" />
  <input type="email" id="setup-email" placeholder="Your email" autocomplete="username" />
  <input type="password" id="setup-password" placeholder="New personal password (10+ chars)" autocomplete="new-password" />
  <button type="button" id="setup-btn">Create Owner Account</button>
  <p class="error" id="setup-error" hidden></p>
</div>

<div id="admin-view" class="wrap" hidden>
  <div class="top-bar">
    <h1>Orders</h1>
    <div class="top-actions">
      <span id="logged-in-as" style="align-self:center;font-size:13px;color:rgba(34,30,26,.6)"></span>
      <button type="button" class="small-btn" id="sync-btn">Sync from Stripe</button>
      <button type="button" class="small-btn" id="logout-btn">Log Out</button>
    </div>
  </div>
  <p class="sync-note" id="sync-note"></p>
  <div class="filter-bar">
    <input type="search" id="search-input" placeholder="Search name, phone, email, address, order #…" />
    <span class="date-label">From</span>
    <input type="date" id="date-from" />
    <span class="date-label">To</span>
    <input type="date" id="date-to" />
    <button type="button" class="clear-btn" id="clear-filters-btn">Clear</button>
  </div>
  <p class="result-count" id="result-count"></p>
  <div id="table-container"><div class="loading">Loading orders…</div></div>

  <div class="team-card" id="team-card" hidden>
    <h2>Add Team Member</h2>
    <input type="text" id="team-name" placeholder="Full name" />
    <input type="email" id="team-email" placeholder="Email" />
    <input type="password" id="team-password" placeholder="Temporary password (10+ chars)" autocomplete="new-password" />
    <select id="team-role">
      <option value="manager" selected>Manager</option>
      <option value="owner">Owner</option>
    </select>
    <button type="button" class="small-btn" id="team-add-btn">Add Team Member</button>
    <p class="team-note" id="team-note"></p>
  </div>
</div>

<script>
  const STORAGE_KEY = 'rfh_admin_session';

  const loginView = document.getElementById('login-view');
  const setupView = document.getElementById('setup-view');
  const adminView = document.getElementById('admin-view');
  const emailInput = document.getElementById('email-input');
  const passwordInput = document.getElementById('password-input');
  const loginBtn = document.getElementById('login-btn');
  const loginError = document.getElementById('login-error');
  const setupBtn = document.getElementById('setup-btn');
  const setupError = document.getElementById('setup-error');
  const loggedInAs = document.getElementById('logged-in-as');
  const teamCard = document.getElementById('team-card');
  const teamNote = document.getElementById('team-note');
  const logoutBtn = document.getElementById('logout-btn');

  function getSession() {
    try { return JSON.parse(sessionStorage.getItem(STORAGE_KEY)) || null; }
    catch (e) { return null; }
  }
  function setSession(session) { sessionStorage.setItem(STORAGE_KEY, JSON.stringify(session)); }
  function clearSession() { sessionStorage.removeItem(STORAGE_KEY); }

  function enterAdminUI(session) {
    loginView.hidden = true;
    setupView.hidden = true;
    adminView.hidden = false;
    loggedInAs.textContent = 'Logged in as ' + session.name + ' (' + session.role + ')';
    teamCard.hidden = session.role !== 'owner';
  }

  function backToLogin(message) {
    clearSession();
    adminView.hidden = true;
    setupView.hidden = true;
    loginView.hidden = false;
    passwordInput.value = '';
    if (message) { loginError.textContent = message; loginError.hidden = false; }
  }
  const syncBtn = document.getElementById('sync-btn');
  const syncNote = document.getElementById('sync-note');
  const tableContainer = document.getElementById('table-container');
  const searchInput = document.getElementById('search-input');
  const dateFromInput = document.getElementById('date-from');
  const dateToInput = document.getElementById('date-to');
  const clearFiltersBtn = document.getElementById('clear-filters-btn');
  const resultCount = document.getElementById('result-count');

  let orders = [];
  let sortKey = 'order_date';
  let sortDir = 'desc';
  const expanded = new Set();

  function esc(value) {
    return String(value ?? '').replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  function formatDate(value) {
    if (!value) return '—';
    return new Date(value).toLocaleString('en-US', {
      year: 'numeric', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit'
    });
  }

  function formatMoney(value) {
    if (value === null || value === undefined) return '—';
    return '$' + Number(value).toFixed(2);
  }

  function itemsSummary(items) {
    if (!Array.isArray(items) || items.length === 0) return '—';
    return items.map((it) => it.quantity + '× ' + it.description).join('; ');
  }

  // Every column stored in the Supabase orders table, in order.
  // "truncate" caps the cell width; the full value is always in the
  // expandable detail row.
  const columns = [
    { key: 'order_date', label: 'Date', render: (o) => esc(formatDate(o.order_date)) },
    { key: 'order_id', label: 'Order #', render: (o) => esc(o.order_id || '—') },
    { key: 'customer_name', label: 'Customer', render: (o) => esc(o.customer_name || '—') },
    { key: 'email', label: 'Email', render: (o) => esc(o.email || '—') },
    { key: 'phone', label: 'Phone', render: (o) => esc(o.phone || '—') },
    { key: 'address', label: 'Address', truncate: true, render: (o) => esc((o.address || '—').replace(/\n/g, ', ')) },
    { key: 'zip', label: 'Zip', render: (o) => esc(o.zip || '—') },
    { key: 'shipping_tier', label: 'Tier', render: (o) => esc(o.shipping_tier || '—') },
    { key: 'notes', label: 'Notes', truncate: true, render: (o) => esc(o.notes || '—') },
    { key: 'items', label: 'Items', truncate: true, render: (o) => esc(itemsSummary(o.items)) },
    { key: 'subtotal', label: 'Subtotal', money: true, render: (o) => esc(formatMoney(o.subtotal)) },
    { key: 'shipping', label: 'Shipping', money: true, render: (o) => esc(formatMoney(o.shipping)) },
    { key: 'coupon_code', label: 'Coupon', render: (o) => esc(o.coupon_code || '—') },
    { key: 'discount', label: 'Discount', money: true, render: (o) => esc(o.discount ? '−' + formatMoney(o.discount) : '—') },
    { key: 'tip', label: 'Tip', money: true, render: (o) => esc(formatMoney(o.tip)) },
    { key: 'total', label: 'Total', money: true, render: (o) => '<strong>' + esc(formatMoney(o.total)) + '</strong>' },
    { key: 'terms_agreed_at', label: 'Terms Agreed', render: (o) => esc(o.terms_agreed_at ? formatDate(o.terms_agreed_at) : '—') },
    { key: 'created_at', label: 'Recorded', render: (o) => esc(o.created_at ? formatDate(o.created_at) : '—') },
    { key: 'status', label: 'Status', render: (o) => {
      const status = o.order_status || 'pending';
      return '<select class="status-select ' + (status === 'delivered' ? 'is-delivered' : 'is-pending') + '" data-order="' + esc(o.order_id) + '">' +
        '<option value="pending"' + (status === 'pending' ? ' selected' : '') + '>Pending</option>' +
        '<option value="delivered"' + (status === 'delivered' ? ' selected' : '') + '>Delivered</option>' +
        '</select>';
    } }
  ];

  function sortValue(order, key) {
    if (key === 'status') return order.order_status || 'pending';
    if (key === 'items') return itemsSummary(order.items);
    const moneyKeys = ['subtotal', 'shipping', 'discount', 'tip', 'total'];
    if (moneyKeys.includes(key)) return Number(order[key]) || 0;
    return order[key] ?? '';
  }

  function filteredOrders() {
    const query = searchInput.value.trim().toLowerCase();
    const from = dateFromInput.value ? new Date(dateFromInput.value + 'T00:00:00') : null;
    const to = dateToInput.value ? new Date(dateToInput.value + 'T23:59:59.999') : null;

    return orders.filter((o) => {
      if (from || to) {
        const orderDate = o.order_date ? new Date(o.order_date) : null;
        if (!orderDate) return false;
        if (from && orderDate < from) return false;
        if (to && orderDate > to) return false;
      }

      if (query) {
        const haystack = [o.customer_name, o.phone, o.email, o.address, o.order_id]
          .map((v) => String(v ?? '').toLowerCase())
          .join(' ');
        if (!haystack.includes(query)) return false;
      }

      return true;
    });
  }

  function sortedOrders() {
    const copy = filteredOrders();
    copy.sort((a, b) => {
      const av = sortValue(a, sortKey);
      const bv = sortValue(b, sortKey);
      if (av < bv) return sortDir === 'asc' ? -1 : 1;
      if (av > bv) return sortDir === 'asc' ? 1 : -1;
      return 0;
    });
    return copy;
  }

  function detailField(label, value) {
    return '<div class="detail-field"><div class="label">' + esc(label) + '</div>' +
      '<div class="value">' + (value ? esc(value) : '—') + '</div></div>';
  }

  function renderDetail(o) {
    const fields =
      detailField('Phone', o.phone) +
      detailField('Delivery Address', o.address) +
      detailField('Zip', o.zip) +
      detailField('Shipping Tier', o.shipping_tier) +
      detailField('Order Notes', o.notes) +
      detailField('Terms Agreed At', o.terms_agreed_at ? formatDate(o.terms_agreed_at) : '') +
      detailField('Recorded At', o.created_at ? formatDate(o.created_at) : '');

    const items = Array.isArray(o.items) ? o.items : [];
    const itemRows = items.map((it) =>
      '<tr><td>' + esc(it.quantity) + ' ×</td><td>' + esc(it.description) + '</td><td>' + formatMoney(it.amount) + '</td></tr>'
    ).join('');
    const itemsBlock =
      '<div class="items-block"><div class="label">Items</div>' +
      (itemRows ? '<table class="items-table"><tbody>' + itemRows + '</tbody></table>' : '<div class="value">—</div>') +
      '</div>';

    const discountPart = o.coupon_code
      ? ' &nbsp;·&nbsp; Discount (' + esc(o.coupon_code) + '): −' + formatMoney(o.discount)
      : '';
    const money =
      '<div class="money-summary">Subtotal: ' + formatMoney(o.subtotal) +
      ' &nbsp;·&nbsp; Shipping: ' + formatMoney(o.shipping) +
      discountPart +
      ' &nbsp;·&nbsp; Tip: ' + formatMoney(o.tip) +
      ' &nbsp;·&nbsp; <strong>Total: ' + formatMoney(o.total) + '</strong></div>';

    return '<div class="detail-grid">' + fields + '</div>' + itemsBlock + money;
  }

  function renderTable() {
    if (orders.length === 0) {
      resultCount.textContent = '';
      tableContainer.innerHTML = '<div class="empty">No orders yet.</div>';
      return;
    }

    const visible = sortedOrders();
    resultCount.textContent = visible.length === orders.length
      ? orders.length + ' order' + (orders.length === 1 ? '' : 's')
      : visible.length + ' of ' + orders.length + ' orders match';

    if (visible.length === 0) {
      tableContainer.innerHTML = '<div class="empty">No orders match these filters.</div>';
      return;
    }

    const colCount = columns.length + 1;
    const rows = visible.map((o) => {
      const isOpen = expanded.has(o.order_id);
      const cells = columns.map((col) =>
        '<td' + (col.truncate ? ' class="truncate"' : '') + '>' + col.render(o) + '</td>'
      ).join('');
      const summary =
        '<tr class="summary-row" data-order="' + esc(o.order_id) + '">' +
        '<td><span class="expand-caret">' + (isOpen ? '▼' : '►') + '</span></td>' +
        cells +
        '</tr>';
      const detail = isOpen
        ? '<tr><td class="detail-cell" colspan="' + colCount + '">' + renderDetail(o) + '</td></tr>'
        : '';
      return summary + detail;
    }).join('');

    const headerCells = '<th></th>' + columns.map((col) => {
      const arrow = sortKey === col.key ? (sortDir === 'asc' ? '▲' : '▼') : '';
      return '<th data-key="' + col.key + '">' + esc(col.label) + '<span class="sort-arrow">' + arrow + '</span></th>';
    }).join('');

    tableContainer.innerHTML =
      '<div class="table-scroll"><table>' +
      '<thead><tr>' + headerCells + '</tr></thead>' +
      '<tbody>' + rows + '</tbody>' +
      '</table></div>';

    tableContainer.querySelectorAll('th[data-key]').forEach((th) => {
      th.addEventListener('click', () => {
        const key = th.dataset.key;
        if (sortKey === key) {
          sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          sortKey = key;
          sortDir = 'asc';
        }
        renderTable();
      });
    });

    tableContainer.querySelectorAll('tr.summary-row').forEach((tr) => {
      tr.addEventListener('click', () => {
        const id = tr.dataset.order;
        if (expanded.has(id)) expanded.delete(id);
        else expanded.add(id);
        renderTable();
      });
    });

    tableContainer.querySelectorAll('.status-select').forEach((select) => {
      select.addEventListener('click', (e) => e.stopPropagation());
      select.addEventListener('change', async (e) => {
        e.stopPropagation();
        const orderId = select.dataset.order;
        const status = select.value;
        select.disabled = true;

        try {
          const session = getSession();
          const response = await fetch('/api/update-order-status', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: session ? session.token : '', orderId, status })
          });
          const data = await response.json();
          if (response.status === 401) { backToLogin(data.error); return; }
          if (!response.ok) throw new Error(data.error || 'Update failed');

          const order = orders.find((o) => o.order_id === orderId);
          if (order) order.order_status = status;
        } catch (err) {
          syncNote.textContent = 'Status update failed for ' + orderId + ': ' + err.message;
        } finally {
          renderTable();
        }
      });
    });
  }

  async function fetchOrders(token) {
    const response = await fetch('/api/admin-orders', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token })
    });
    const data = await response.json();
    if (response.status === 401) { backToLogin(data.error); throw new Error(data.error); }
    if (!response.ok) throw new Error(data.error || 'Failed to load orders');
    return data.orders;
  }

  async function showAdminView(session) {
    enterAdminUI(session);
    try {
      orders = await fetchOrders(session.token);
      renderTable();
    } catch (err) {
      if (!adminView.hidden) backToLogin(err.message);
    }
  }

  loginBtn.addEventListener('click', async () => {
    const email = emailInput.value.trim();
    const password = passwordInput.value;
    if (!email || !password) return;

    loginBtn.disabled = true;
    loginError.hidden = true;

    try {
      const response = await fetch('/api/admin-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await response.json();
      if (data.needsSetup) {
        loginView.hidden = true;
        setupView.hidden = false;
        return;
      }
      if (!response.ok) throw new Error(data.error || 'Login failed');

      const session = { token: data.token, name: data.name, role: data.role };
      setSession(session);
      passwordInput.value = '';
      await showAdminView(session);
    } catch (err) {
      loginError.textContent = err.message;
      loginError.hidden = false;
    } finally {
      loginBtn.disabled = false;
    }
  });

  setupBtn.addEventListener('click', async () => {
    setupBtn.disabled = true;
    setupError.hidden = true;

    try {
      const response = await fetch('/api/admin-setup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          bootstrapPassword: document.getElementById('setup-bootstrap').value,
          name: document.getElementById('setup-name').value,
          email: document.getElementById('setup-email').value,
          password: document.getElementById('setup-password').value
        })
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error || 'Setup failed');

      const session = { token: data.token, name: data.name, role: data.role };
      setSession(session);
      await showAdminView(session);
    } catch (err) {
      setupError.textContent = err.message;
      setupError.hidden = false;
    } finally {
      setupBtn.disabled = false;
    }
  });

  passwordInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') loginBtn.click();
  });

  logoutBtn.addEventListener('click', async () => {
    const session = getSession();
    if (session) {
      try {
        await fetch('/api/admin-logout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: session.token })
        });
      } catch (e) { /* session is cleared locally regardless */ }
    }
    backToLogin();
  });

  document.getElementById('team-add-btn').addEventListener('click', async () => {
    const session = getSession();
    if (!session) return;
    const btn = document.getElementById('team-add-btn');
    btn.disabled = true;
    teamNote.textContent = '';

    try {
      const response = await fetch('/api/admin-create-user', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          token: session.token,
          name: document.getElementById('team-name').value,
          email: document.getElementById('team-email').value,
          password: document.getElementById('team-password').value,
          role: document.getElementById('team-role').value
        })
      });
      const data = await response.json();
      if (response.status === 401) { backToLogin(data.error); return; }
      if (!response.ok) throw new Error(data.error || 'Could not create the account');

      teamNote.textContent = 'Account created for ' + data.user.name + ' (' + data.user.role + '). Share their password with them securely.';
      document.getElementById('team-name').value = '';
      document.getElementById('team-email').value = '';
      document.getElementById('team-password').value = '';
    } catch (err) {
      teamNote.textContent = 'Error: ' + err.message;
    } finally {
      btn.disabled = false;
    }
  });

  searchInput.addEventListener('input', renderTable);
  dateFromInput.addEventListener('change', renderTable);
  dateToInput.addEventListener('change', renderTable);

  clearFiltersBtn.addEventListener('click', () => {
    searchInput.value = '';
    dateFromInput.value = '';
    dateToInput.value = '';
    renderTable();
  });

  syncBtn.addEventListener('click', async () => {
    const session = getSession();
    if (!session) return;

    syncBtn.disabled = true;
    syncBtn.textContent = 'Syncing…';
    syncNote.textContent = '';

    try {
      const response = await fetch('/api/reconcile-orders', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token: session.token })
      });
      const data = await response.json();
      if (response.status === 401) { backToLogin(data.error); return; }
      if (!response.ok) throw new Error(data.error || 'Sync failed');

      const n = data.backfilled.length;
      syncNote.textContent = 'Checked ' + data.checked + ' paid Stripe session(s) from the last 30 days — ' +
        (n ? 'recovered ' + n + ' missing order(s).' : 'no missing orders found.') +
        (data.failed.length ? ' ' + data.failed.length + ' failed — see logs.' : '');

      orders = await fetchOrders(session.token);
      renderTable();
    } catch (err) {
      syncNote.textContent = 'Sync error: ' + err.message;
    } finally {
      syncBtn.disabled = false;
      syncBtn.textContent = 'Sync from Stripe';
    }
  });

  const savedSession = getSession();
  if (savedSession) {
    showAdminView(savedSession);
  }
</script>
</body>
</html>
