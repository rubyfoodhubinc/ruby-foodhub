<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ruby FoodHub — Orders</title>
<style>
  body { margin: 0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: oklch(97% 0.015 60); color: oklch(22% 0.02 40); }
  * { box-sizing: border-box; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 40px 24px; }
  .login-card { max-width: 360px; margin: 120px auto; background: #fff; border-radius: 16px; box-shadow: 0 6px 18px rgba(34,30,26,.08); padding: 36px; text-align: center; }
  .login-card h1 { font-size: 20px; margin: 0 0 20px; }
  input[type="password"] { width: 100%; padding: 11px 14px; border: 1.5px solid rgba(34,30,26,.18); border-radius: 10px; font-size: 14.5px; margin-bottom: 14px; }
  button { background: oklch(45% 0.17 20); color: #fff; border: none; border-radius: 100px; padding: 12px 0; width: 100%; font-size: 14.5px; font-weight: 700; cursor: pointer; }
  button:hover { background: oklch(52% 0.19 20); }
  button:disabled { background: #ccc; cursor: not-allowed; }
  .error { color: oklch(45% 0.17 20); font-size: 13px; margin: 12px 0 0; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .top-bar h1 { font-size: 22px; margin: 0; }
  .logout-btn { width: auto; padding: 9px 18px; font-size: 13px; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 10px rgba(34,30,26,.06); }
  th, td { text-align: left; padding: 12px 16px; font-size: 14px; border-bottom: 1px solid rgba(34,30,26,.08); }
  th { font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; color: rgba(34,30,26,.55); cursor: pointer; user-select: none; white-space: nowrap; }
  th:hover { color: oklch(45% 0.17 20); }
  tr:last-child td { border-bottom: none; }
  .status-pill { display: inline-block; background: oklch(90% 0.08 150); color: oklch(35% 0.1 150); font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 100px; }
  .empty, .loading { text-align: center; padding: 60px 0; color: rgba(34,30,26,.5); }
  .sort-arrow { font-size: 10px; margin-left: 4px; opacity: 0.6; }
</style>
</head>
<body>

<div id="login-view" class="login-card">
  <h1>Ruby FoodHub — Orders</h1>
  <input type="password" id="password-input" placeholder="Password" autocomplete="current-password" />
  <button type="button" id="login-btn">Log In</button>
  <p class="error" id="login-error" hidden></p>
</div>

<div id="admin-view" class="wrap" hidden>
  <div class="top-bar">
    <h1>Orders</h1>
    <button type="button" class="logout-btn" id="logout-btn">Log Out</button>
  </div>
  <div id="table-container"><div class="loading">Loading orders…</div></div>
</div>

<script>
  const STORAGE_KEY = 'rfh_admin_password';

  const loginView = document.getElementById('login-view');
  const adminView = document.getElementById('admin-view');
  const passwordInput = document.getElementById('password-input');
  const loginBtn = document.getElementById('login-btn');
  const loginError = document.getElementById('login-error');
  const logoutBtn = document.getElementById('logout-btn');
  const tableContainer = document.getElementById('table-container');

  let orders = [];
  let sortKey = 'order_date';
  let sortDir = 'desc';

  const columns = [
    { key: 'order_date', label: 'Date' },
    { key: 'order_id', label: 'Order #' },
    { key: 'customer_name', label: 'Customer' },
    { key: 'total', label: 'Total' },
    { key: 'status', label: 'Status' }
  ];

  function formatDate(value) {
    if (!value) return '—';
    return new Date(value).toLocaleString('en-US', {
      year: 'numeric', month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit'
    });
  }

  function formatMoney(value) {
    if (value === null || value === undefined) return '—';
    return '$' + Number(value).toFixed(2);
  }

  function sortedOrders() {
    const copy = orders.slice();
    copy.sort((a, b) => {
      let av = a[sortKey];
      let bv = b[sortKey];
      if (sortKey === 'status') { av = 'Paid'; bv = 'Paid'; }
      if (sortKey === 'total') { av = Number(av) || 0; bv = Number(bv) || 0; }
      if (av < bv) return sortDir === 'asc' ? -1 : 1;
      if (av > bv) return sortDir === 'asc' ? 1 : -1;
      return 0;
    });
    return copy;
  }

  function renderTable() {
    if (orders.length === 0) {
      tableContainer.innerHTML = '<div class="empty">No orders yet.</div>';
      return;
    }

    const rows = sortedOrders().map((o) => `
      <tr>
        <td>${formatDate(o.order_date)}</td>
        <td>${o.order_id || '—'}</td>
        <td>${o.customer_name || '—'}</td>
        <td>${formatMoney(o.total)}</td>
        <td><span class="status-pill">Paid</span></td>
      </tr>
    `).join('');

    const headerCells = columns.map((col) => {
      const arrow = sortKey === col.key ? (sortDir === 'asc' ? '▲' : '▼') : '';
      return `<th data-key="${col.key}">${col.label}<span class="sort-arrow">${arrow}</span></th>`;
    }).join('');

    tableContainer.innerHTML = `
      <table>
        <thead><tr>${headerCells}</tr></thead>
        <tbody>${rows}</tbody>
      </table>
    `;

    tableContainer.querySelectorAll('th').forEach((th) => {
      th.addEventListener('click', () => {
        const key = th.dataset.key;
        if (sortKey === key) {
          sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          sortKey = key;
          sortDir = 'asc';
        }
        renderTable();
      });
    });
  }

  async function fetchOrders(password) {
    const response = await fetch('/api/admin-orders', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password })
    });
    const data = await response.json();
    if (!response.ok) throw new Error(data.error || 'Failed to load orders');
    return data.orders;
  }

  async function showAdminView(password) {
    loginView.hidden = true;
    adminView.hidden = false;
    try {
      orders = await fetchOrders(password);
      renderTable();
    } catch (err) {
      sessionStorage.removeItem(STORAGE_KEY);
      adminView.hidden = true;
      loginView.hidden = false;
      loginError.textContent = err.message;
      loginError.hidden = false;
    }
  }

  loginBtn.addEventListener('click', async () => {
    const password = passwordInput.value;
    if (!password) return;

    loginBtn.disabled = true;
    loginError.hidden = true;

    try {
      const result = await fetchOrders(password);
      orders = result;
      sessionStorage.setItem(STORAGE_KEY, password);
      loginView.hidden = true;
      adminView.hidden = false;
      renderTable();
    } catch (err) {
      loginError.textContent = err.message;
      loginError.hidden = false;
    } finally {
      loginBtn.disabled = false;
    }
  });

  passwordInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') loginBtn.click();
  });

  logoutBtn.addEventListener('click', () => {
    sessionStorage.removeItem(STORAGE_KEY);
    adminView.hidden = true;
    loginView.hidden = false;
    passwordInput.value = '';
  });

  const savedPassword = sessionStorage.getItem(STORAGE_KEY);
  if (savedPassword) {
    showAdminView(savedPassword);
  }
</script>
</body>
</html>
